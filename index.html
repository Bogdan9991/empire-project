    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: #050505; color: #fff; overflow-x: hidden; scroll-behavior: smooth; }

        /* ВЕРХНЕЕ МЕНЮ */
        header {
            position: fixed; width: 100%; top: 0; z-index: 1000;
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            backdrop-filter: blur(10px);
        }
        .logo { font-size: 24px; font-weight: 900; text-transform: uppercase; color: #ff0000; letter-spacing: 2px; }
        
        nav a { 
            color: #fff; text-decoration: none; font-weight: 700; margin-left: 30px; 
            font-size: 14px; text-transform: uppercase; transition: 0.3s; opacity: 0.7;
        }
        nav a:hover { opacity: 1; color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        /* ГЛАВНЫЙ БЛОК С АНИМАЦИЕЙ */
        .hero {
            height: 100vh; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)), 
                        url('https://i.ytimg.com');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }

        .hero h1 { 
            font-size: clamp(3rem, 10vw, 6rem); font-weight: 900; text-transform: uppercase; 
            margin-bottom: 20px; line-height: 0.9;
        }
        .hero h1 span { color: #ff0000; text-shadow: 0 0 30px rgba(255,0,0,0.8); }

        /* КРУТАЯ АНИМИРОВАННАЯ КНОПКА */
        .btn-main {
            position: relative; padding: 22px 70px; font-size: 1.4rem; font-weight: 900;
            text-decoration: none; color: #fff; text-transform: uppercase;
            background: linear-gradient(45deg, #ff0000, #990000);
            border-radius: 15px; border: none; overflow: hidden;
            box-shadow: 0 10px 40px rgba(255, 0, 0, 0.4);
            transition: 0.4s; z-index: 1;
        }
        .btn-main:hover { transform: scale(1.08) translateY(-5px); box-shadow: 0 20px 50px rgba(255, 0, 0, 0.7); }
        
        /* Блеск на кнопке */
        .btn-main::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-25deg); transition: 0.5s;
        }
        .btn-main:hover::before { left: 150%; }

        /* СЕКЦИЯ С КАРТОЧКАМИ */
        .sides { padding: 100px 5%; text-align: center; }
        .card-wrap { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; margin-top: 50px; }
        
        .card {
            width: 340px; height: 480px; border-radius: 30px; overflow: hidden;
            position: relative; cursor: pointer; border: 2px solid rgba(255,255,255,0.05);
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .card:hover { transform: translateY(-25px); border-color: #ff0000; }
        .card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); transition: 0.6s; }
        .card:hover img { filter: brightness(1.1) scale(1.1); }

        .card-info {
            position: absolute; bottom: 0; width: 100%; padding: 40px 20px;background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            text-align: center;
        }
        .card-info h3 { font-size: 1.5rem; text-transform: uppercase; font-weight: 900; }
        .blue { color: #00a2ff; text-shadow: 0 0 15px #00a2ff; }
        .red { color: #ff0000; text-shadow: 0 0 15px #ff0000; }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 768px) {
            nav { display: none; } /* Прячем меню на мобилках для чистоты */
            .hero h1 { font-size: 3.5rem; }
            .card { width: 90%; }
        }
    </style>
</head>
