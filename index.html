<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Roleplay</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Roboto', sans-serif; background: #000; color: #fff; overflow: hidden; }
        
        /* Фон с эффектом затемнения */
        .bg {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), 
                        url('https://wallpapershome.com'); /* Качественный фон */
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: #ff00ff;
            text-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff;
            letter-spacing: 3px;
        }

        .online {
            color: #00ff00;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #00ff00;
        }

        .btn {
            background: linear-gradient(45deg, #ff00ff, #800080);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.8);
            border: 2px solid #fff;
        }

        .footer { position: absolute; bottom: 20px; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <h1>Empire RP</h1>
        <div class="online">● Игроков онлайн: 127</div>
        <a href="https://t.me/empire560" class="btn">СКАЧАТЬ ЛАУНЧЕР</a>
        <div class="footer">© 2026 Empire Role Play Project</div>
    </div>
</body>
</html>
