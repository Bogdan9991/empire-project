<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Roleplay | Начни игру</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body {
            background: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }

        /* Задний фон с крутым градиентом или картинкой */
        .hero {
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.wallpaperscraft.ru'); /* Сюда свою картинку */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo {
            font-size: 80px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 69, 0, 0.8);
        }

        .logo span { color: #ff4500; }

        .description {
            font-size: 20px;
            margin-bottom: 40px;
            max-width: 600px;
            color: #ccc;
        }

        .btn-container {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 18px 45px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-download {
            background: #ff4500;
            color: white;
            box-shadow: 0 10px 20px rgba(255, 69, 0, 0.3);
        }

        .btn-download:hover {
            transform: scale(1.05);
            background: #ff5722;
        }

        .btn-tg {
            background: #24A1DE;
            color: white;
        }

        .btn-tg:hover {
            transform: scale(1.05);
            background: #34B1EE;
        }

        /* Анимация появления */
        .fade-in {
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="fade-in">
            <h1 class="logo">EMPIRE <span>RP</span></h1>
            <p class="description">Погрузись в мир реальной жизни на лучшем мобильном проекте. Стань тем, кем всегда мечтал!</p>
            
            <div class="btn-container">
                <!-- Твоя ссылка на скачивание -->
                <a href="https://t.me/empire560" class="btn btn-download">Скачать Лаунчер</a>
                <a href="https://t.me/empire560" class="btn btn-tg">Наш Telegram</a>
            </div>
        </div>
    </section>

</body>
</html>
