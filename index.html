<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire RolePlay</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        /* Стили — аккуратно копируй этот блок */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }
        
        .hero {
            height: 100vh; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)), 
                        url('https://i.ytimg.com'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }

        h1 { font-size: 3rem; font-weight: 900; color: #ff0000; text-transform: uppercase; margin-bottom: 20px; }
        .btn-play {
            background: #ff0000; color: #fff; padding: 15px 40px; border-radius: 10px;
            font-weight: 700; text-decoration: none; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }

        .sides { padding: 50px 20px; text-align: center; }
        .sides-box { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
        .card { width: 280px; border-radius: 15px; overflow: hidden; border: 1px solid #333; position: relative; }
        .card img { width: 100%; display: block; }
        .badge { position: absolute; bottom: 15px; width: 100%; text-align: center; font-weight: 900; text-transform: uppercase; }
        .blue { color: #0084ff; }
        .red { color: #ff0000; }
    </style>
</head>
<body>

    <section class="hero">
        <p>ДОБРО ПОЖАЛОВАТЬ</p>
        <h1>EMPIRE RP</h1>
        <a href="https://t.me/empire560" class="btn-play">Начать играть</a>
    </section>

    <section class="sides">
        <h2>ВЫБЕРИ СВОЮ СТОРОНУ</h2>
        <div class="sides-box">
            <div class="card">
                <img src="https://russia-online.org" alt="Закон">
                <div class="badge blue">Жизнь по закону</div>
            </div>
            <div class="card">
                <img src="https://russia-online.org" alt="Криминал">
                <div class="badge red">Бандитская жизнь</div>
            </div>
        </div>
    </section>

</body>
</html>
